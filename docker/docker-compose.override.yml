---
# docker-compose.override.yml — Local development overrides
#
# This file is automatically merged by Docker Compose when present.
# It relaxes port bindings for local dev (bind to all interfaces).
# Do NOT use this in production.

services:
  wazuh-manager:
    ports:
      - "1514:1514/tcp"
      - "1514:1514/udp"
      - "1515:1515/tcp"
      - "55000:55000/tcp"

  wazuh-dashboard:
    ports:
      - "443:5601/tcp"
